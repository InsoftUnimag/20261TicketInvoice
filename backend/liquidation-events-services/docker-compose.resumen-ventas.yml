services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: resumen_ventas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resumen_ventas"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquidation-events-services:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker-resumen
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resumen_ventas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
